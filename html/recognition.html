<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recognition | Vision Assistant</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="gradient-bg"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div style="padding: 0 1rem 2rem; border-bottom: 1px solid var(--card-border); margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="eye"></i> Vision
                </h2>
            </div>

            <nav style="flex: 1;">
                <a href="dashboard.html" class="nav-link">
                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                </a>
                <a href="recognition.html" class="nav-link">
                    <i data-lucide="camera"></i> <span>Recognition</span>
                </a>
                <a href="train.html" class="nav-link">
                    <i data-lucide="dumbbell"></i> <span>Training</span>
                </a>
                <a href="library.html" class="nav-link">
                    <i data-lucide="library"></i> <span>Library</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i data-lucide="settings"></i> <span>Settings</span>
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--card-border);">
                <button id="logout-btn" class="nav-link"
                    style="background: transparent; border: none; width: 100%; cursor: pointer;">
                    <i data-lucide="log-out"></i> <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Real-time Recognition</h1>
                <p>Start the assistant to begin controlling applications.</p>
            </header>

            <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 1.5rem;">
                <!-- Webcam Card -->
                <div class="glass-card" style="padding: 1rem;">
                    <div class="webcam-container" id="detector-frame">
                        <video id="webcam-video" autoplay playsinline style="display: none;"></video>
                        <canvas id="canvas-overlay"></canvas>

                        <!-- HUD Overlay -->
                        <div
                            style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.6); padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--card-border);">
                            <span id="status-badge" style="color: #ff4d4d; font-size: 0.75rem; font-weight: 700;">●
                                INACTIVE</span>
                        </div>
                    </div>

                    <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                        <button id="start-btn" class="btn btn-primary" style="background: #0070f3; color: white;">
                            <i data-lucide="play"></i> Start Assistant
                        </button>
                        <button id="stop-btn" class="btn btn-outline" disabled>
                            <i data-lucide="square"></i> Stop
                        </button>
                    </div>
                </div>

                <!-- Recognition Info -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="glass-card">
                        <h3 style="font-size: 0.9rem; color: #888; margin-bottom: 1rem;">Detected Gesture</h3>
                        <h2 id="gesture-label" style="font-size: 1.8rem;">None</h2>
                        <div class="confidence-bar">
                            <div id="confidence-fill" class="confidence-fill" style="width: 0%;"></div>
                        </div>
                        <p id="confidence-text" style="font-size: 0.75rem; margin-top: 0.5rem; text-align: right;">0%
                            Confidence</p>
                    </div>

                    <div class="glass-card">
                        <h3 style="font-size: 0.9rem; color: #888; margin-bottom: 1rem;">Triggered Action</h3>
                        <div id="action-display"
                            style="padding: 1rem; background: rgba(0,255,0,0.1); border-radius: 8px; border: 1px solid rgba(0,255,0,0.2); text-align: center;">
                            <span style="font-size: 0.95rem; font-weight: 600; color: #00ff00;">No Action</span>
                        </div>
                    </div>

                    <div class="glass-card" style="flex: 1;">
                        <h3 style="font-size: 0.9rem; color: #888; margin-bottom: 1rem;">Action Log</h3>
                        <div id="log-console" class="log-console" style="height: 150px; font-size: 0.75rem;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import WebcamHandler from '../js/webcam.js';
        import api from '../js/api.js';
        import App from '../js/app.js';

        lucide.createIcons();

        const video = document.getElementById('webcam-video');
        const canvas = document.getElementById('canvas-overlay');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusBadge = document.getElementById('status-badge');
        const gestureLabel = document.getElementById('gesture-label');
        const confidenceFill = document.getElementById('confidence-fill');
        const confidenceText = document.getElementById('confidence-text');
        const actionDisplay = document.querySelector('#action-display span');

        let hands;
        let camera;
        let isStarted = false;

        async function initMediaPipe() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);
        }

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#0070f3', lineWidth: 4 });
                    drawLandmarks(ctx, landmarks, { color: '#ffffff', lineWidth: 2, radius: 4 });

                    // Send to backend for recognition every X frames
                    recognizeGesture(landmarks);
                }
            }
            ctx.restore();
        }

        let lastRecognition = 0;
        async function recognizeGesture(landmarks) {
            const now = Date.now();
            if (now - lastRecognition < 200) return; // Limit API calls
            lastRecognition = now;

            const res = await api.recognizeFrame(landmarks);
            if (res && res.gesture && res.gesture !== 'None') {
                gestureLabel.textContent = res.gesture;
                confidenceFill.style.width = (res.confidence * 100) + '%';
                confidenceText.textContent = Math.round(res.confidence * 100) + '% Confidence';

                if (res.action) {
                    actionDisplay.textContent = res.action;
                    actionDisplay.parentElement.style.background = 'rgba(0,255,0,0.1)';
                    actionDisplay.style.color = '#00ff00';
                    App.log(`Triggered: ${res.action}`);
                } else {
                    actionDisplay.textContent = 'No Action Mapped';
                    actionDisplay.parentElement.style.background = 'rgba(255,255,255,0.05)';
                    actionDisplay.style.color = '#888';
                }
            } else {
                gestureLabel.textContent = 'None';
                confidenceFill.style.width = '0%';
                confidenceText.textContent = '0% Confidence';
                actionDisplay.textContent = 'No Gesture';
                actionDisplay.parentElement.style.background = 'rgba(255,255,255,0.05)';
                actionDisplay.style.color = '#888';
            }
        }

        startBtn.onclick = async () => {
            if (!hands) await initMediaPipe();

            camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 1280,
                height: 720
            });

            canvas.width = 1280;
            canvas.height = 720;

            await camera.start();
            isStarted = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusBadge.textContent = '● ACTIVE';
            statusBadge.style.color = '#00ff00';
            document.getElementById('detector-frame').classList.add('detection-glow');
            App.log("Recognition started");
        };

        stopBtn.onclick = () => {
            if (camera) camera.stop();
            isStarted = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusBadge.textContent = '● INACTIVE';
            statusBadge.style.color = '#ff4d4d';
            document.getElementById('detector-frame').classList.remove('detection-glow');
            App.log("Recognition stopped");
        };

        window.addEventListener('resize', () => {
            // Adjust canvas to container
        });
    </script>
</body>

</html>
