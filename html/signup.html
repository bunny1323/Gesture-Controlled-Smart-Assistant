<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vision Assistant</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="gradient-bg"></div>

    <div class="auth-container">
        <div class="glass-card auth-card">
            <h1>Create Account</h1>
            <p style="margin-bottom: 2rem;">Join the future of computer interaction.</p>

            <form id="signup-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="input-field" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign Up
                </button>
            </form>

            <p style="margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="index.html" style="color: var(--foreground); font-weight: 500;">Sign
                    in</a>
            </p>
        </div>
    </div>

    <script type="module">
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('user', JSON.stringify({ email }));
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
